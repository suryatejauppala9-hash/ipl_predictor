<!DOCTYPE html>
<html>
<head>
    <title>IPL Match Predictor</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9;}
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;}
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold;}
        button:hover { background-color: #218838; }
        #result { font-size: 24px; font-weight: bold; color: #333; text-align: center; margin-top: 20px;}
        label { font-weight: bold; font-size: 14px; color: #555;}
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center;">🏏 IPL Match Predictor</h2>
        
        <label>Team 1</label>
        <select id="team1">
            {% for team in teams %}<option value="{{ team }}">{{ team }}</option>{% endfor %}
        </select>

        <label>Team 2</label>
        <select id="team2">
            {% for team in teams %}<option value="{{ team }}">{{ team }}</option>{% endfor %}
        </select>

        <label>Location (For Team 1)</label>
        <select id="venue_status">
            <option value="home">Home</option>
            <option value="away">Away</option>
            <option value="neutral">Neutral</option>
        </select>

        <label>Toss Winner</label>
        <select id="toss_winner">
            <option value="team1">Team 1</option>
            <option value="team2">Team 2</option>
        </select>

        <label>Toss Decision</label>
        <select id="toss_decision">
            <option value="bat">Bat First</option>
            <option value="field">Bowl First</option>
        </select>

        <button onclick="makePrediction()">Predict Winner</button>

        <div id="result"></div>
    </div>

    <script>
        async function makePrediction() {
        const t1 = document.getElementById('team1').value;
        const t2 = document.getElementById('team2').value;
        const tossWinnerSelection = document.getElementById('toss_winner').value;
        
        const payload = {
            team1: t1,
            team2: t2,
            team1_venue_status: document.getElementById('venue_status').value,
            toss_winner: tossWinnerSelection === 'team1' ? t1 : t2,
            toss_decision: document.getElementById('toss_decision').value
        };

        document.getElementById('result').innerText = "Analyzing stats...";

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if(data.error) {
                document.getElementById('result').style.color = "red";
                document.getElementById('result').innerText = data.error;
            } else {
                document.getElementById('result').style.color = "#28a745";
                // Injected the probability percentage directly into the result text
                document.getElementById('result').innerText = `🏆 Predicted Winner: ${data.winner} (${data.probability}%)`;
            }
        } catch (error) {
            document.getElementById('result').innerText = "Error connecting to server.";
        }
    }
    </script>
</body>
</html>
